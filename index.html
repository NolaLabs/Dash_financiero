<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nola Labs · Tablero Financiero</title>
<meta name="description" content="Tablero financiero corporativo y personal — Nola Labs" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 20 L80 80 L64 80 L50 50 L36 80 L20 80 Z' fill='%23004643'/%3E%3Ccircle cx='86' cy='74' r='7' fill='%23C9883A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>

<!-- ====================================================== LOCK SCREEN -->
<div id="lock">
  <div class="lock-card">
    <img class="lock-iso" src="assets/nola-isotipo.png" alt="Nola Labs" />
    <h1>Tablero</h1>
    <div class="lock-sub" id="lockSub">Finanzas corporativas y personales</div>
    <div class="lock-tag">EJECUTAR, NO PRESENTAR.</div>

    <!-- local access-key gate -->
    <form id="lockForm" autocomplete="off">
      <div class="field" id="emailField" hidden>
        <label for="lockEmail">Correo</label>
        <input type="email" id="lockEmail" placeholder="tu correo" autocomplete="username" />
      </div>
      <div class="field">
        <label for="lockKey" id="keyLabel">Clave de acceso</label>
        <input type="password" id="lockKey" placeholder="••••••••" autocomplete="current-password" autofocus />
      </div>
      <div class="lock-err" id="lockErr"></div>
      <label class="lock-signup" id="signupRow" hidden><input type="checkbox" id="signupChk"> Primera vez — crear mi cuenta en la nube</label>
      <button class="btn btn--primary btn--full" type="submit" id="lockBtn">Entrar</button>
    </form>
    <div class="lock-mode" id="lockMode"></div>
  </div>
</div>

<!-- ====================================================== APP -->
<div id="app">
  <div class="scrim" id="scrim"></div>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="iconbtn menu-btn" id="menuBtn" aria-label="Menú">☰</button>
    <img class="wordmark" src="assets/nola-wordmark.png" alt="Nola Labs" />
    <div class="tb-title">Tablero Financiero<small>EJECUTAR, NO PRESENTAR.</small></div>
    <div class="spacer"></div>
    <div class="tb-status">
      <span class="tb-dot off" id="cloudDot"></span>
      <span id="cloudLabel">Local</span>
    </div>
    <span class="tb-save" id="saveLabel"></span>
    <button class="btn btn--ghost btn--sm" id="logoutBtn">Salir</button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <span class="sb-badge"><img src="assets/nola-isotipo.png" alt="" /></span>
      <span>
        <span class="nm">Nola</span>
        <span class="sub">Mateo Gaviria · CEO</span>
      </span>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="resumen"><span class="ic">◆</span> Resumen</button>
      <button class="nav-item" data-view="empresa"><span class="ic">▲</span> Empresa</button>
      <button class="nav-item" data-view="personal"><span class="ic">●</span> Personal</button>
      <button class="nav-item" data-view="pagos"><span class="ic">✓</span> Pagos del mes</button>
      <button class="nav-item" data-view="salud"><span class="ic">♥</span> Salud financiera</button>
      <button class="nav-item" data-view="proyecciones"><span class="ic">↗</span> Proyecciones</button>
      <div class="nav-sep"></div>
      <button class="nav-item" data-view="editor"><span class="ic">✎</span> Datos · Editar</button>
      <button class="nav-item" data-view="ajustes"><span class="ic">⚙</span> Nube · Ajustes</button>
    </nav>
    <div class="sb-foot">
      <div class="tag">Nola Labs•</div>
      CC 1.019.144.448 · CIIU 7020<br/>
      Pesos colombianos (COP)
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <section class="view active" id="view-resumen"></section>
    <section class="view" id="view-empresa"></section>
    <section class="view" id="view-personal"></section>
    <section class="view" id="view-pagos"></section>
    <section class="view" id="view-salud"></section>
    <section class="view" id="view-proyecciones"></section>
    <section class="view" id="view-editor"></section>
    <section class="view" id="view-ajustes"></section>
  </main>
</div>

<div class="chart-tip" id="tip"></div>
<div id="toast"></div>

<script src="app.js?v=3"></script>
</body>
</html>
